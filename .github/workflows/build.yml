name: Build UsbInputMapper

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore NuGet Packages
      # .sln の代わりに packages.config を直接指定してパッケージを復元します
      run: nuget restore UsbInputMapper/packages.config -PackagesDirectory packages

    - name: Build Project
      # .sln の代わりに .csproj を直接指定してビルドします
      run: |
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
        & $msbuildPath UsbInputMapper/UsbInputMapper.csproj /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.8

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UsbInputMapper-Release
        path: UsbInputMapper/bin/Release/
