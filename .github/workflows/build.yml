name: Build UsbInputMapper

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore NuGet Packages
      # setup-nugetアクションを使わず、標準搭載のnugetを直接使用
      run: nuget restore UsbInputMapper.sln

    - name: Build Solution
      # setup-msbuildアクションを使わず、vswhereを使用して最新のMSBuildを直接探し出して実行
      run: |
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
        & $msbuildPath UsbInputMapper.sln /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.8

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UsbInputMapper-Release
        path: UsbInputMapper/bin/Release/
