name: Build UsbInputMapper

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Auto-Detect and Build
      run: |
        # 1. ファイルを自動検索
        $csproj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        $pkg = Get-ChildItem -Filter packages.config -Recurse | Select-Object -First 1
        $projDir = Split-Path -Parent $csproj.FullName
        $pkgDir = Join-Path $projDir "packages"
        
        Write-Host "=== パッケージの復元 ==="
        nuget restore $pkg.FullName -PackagesDirectory $pkgDir
        
        Write-Host "=== DLL参照パスの強制書き換え ==="
        # ダウンロードしたパッケージから実際のDLL本体を探し出す
        $dlls = Get-ChildItem -Path $pkgDir -Filter *.dll -Recurse
        
        $vigem = $dlls | Where-Object { $_.Name -eq 'Nefarius.ViGEm.Client.dll' -and $_.FullName -match 'net4' } | Select-Object -First 1
        if (-not $vigem) { $vigem = $dlls | Where-Object { $_.Name -eq 'Nefarius.ViGEm.Client.dll' } | Select-Object -First 1 }
        
        $json = $dlls | Where-Object { $_.Name -eq 'Newtonsoft.Json.dll' -and $_.FullName -match 'net4' } | Select-Object -First 1
        if (-not $json) { $json = $dlls | Where-Object { $_.Name -eq 'Newtonsoft.Json.dll' } | Select-Object -First 1 }
        
        if (-not $vigem -or -not $json) {
            Write-Error "DLLの取得に失敗しました。NuGetの復元が正常に行われていません。"
            exit 1
        }
        
        Write-Host "ViGEm 発見: $($vigem.FullName)"
        Write-Host "Json 発見: $($json.FullName)"
        
        # csprojのパス設定を、見つけ出した本物の絶対パスに強制的に書き換える
        $xml = Get-Content $csproj.FullName -Raw
        $xml = $xml -replace '<HintPath>.*?Nefarius\.ViGEm\.Client\.dll</HintPath>', "<HintPath>$($vigem.FullName)</HintPath>"
        $xml = $xml -replace '<HintPath>.*?Newtonsoft\.Json\.dll</HintPath>', "<HintPath>$($json.FullName)</HintPath>"
        Set-Content -Path $csproj.FullName -Value $xml
        
        Write-Host "=== ビルド開始 ==="
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
        
        & $msbuildPath $csproj.FullName /p:Configuration=Release /p:Platform="AnyCPU"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UsbInputMapper-Release
        path: "**/bin/Release/"
