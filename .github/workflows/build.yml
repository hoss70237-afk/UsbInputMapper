name: Build UsbInputMapper

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      # 最新のチェックアウトアクション
      uses: actions/checkout@v4

    - name: Setup MSBuild
      # v1.1 から v2 に更新 (Node.js の問題を解消)
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      # v1.1 から v2 に更新 (Node.js の問題を解消)
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore UsbInputMapper.sln

    - name: Build Solution
      run: msbuild UsbInputMapper.sln /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.8

    - name: Upload Build Artifact
      # 最新のアーティファクトアップロードアクション
      uses: actions/upload-artifact@v4
      with:
        name: UsbInputMapper-Release
        path: UsbInputMapper/bin/Release/
